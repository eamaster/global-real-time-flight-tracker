name = "global-flight-tracker-api"
main = "worker.js"
compatibility_date = "2023-12-01"

# Run close to upstream APIs (OpenSky) to reduce latency/timeouts from edge POPs.
[placement]
mode = "smart"

# OpenSky credentials are secrets — set once via:
#   npx wrangler secret put OPENSKY_CLIENT_ID
#   npx wrangler secret put OPENSKY_CLIENT_SECRET
#
# Or in Cloudflare Dashboard:
#   Workers & Pages → global-flight-tracker-api → Settings → Variables and Secrets

[vars]
# Non-secret runtime vars can go here.
